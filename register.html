<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCQgHcWfkCid4Iv_ASrC5U7m20oJ7IdotE",
  authDomain: "hamzakasweb.firebaseapp.com",
  projectId: "hamzakasweb",
  storageBucket: "hamzakasweb.firebasestorage.app",
  messagingSenderId: "604127846186",
  appId: "1:604127846186:web:11629f1481d858679ac853",
  measurementId: "G-GT5Q49H071"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Account created!");
      window.location = "login.html";
    })
    .catch(error => alert(error.message));
}
</script>

</body>
</html>
