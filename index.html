<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Learning Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 30px;
      font-size: 1.2em;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn-login {
      background: #facc15;
      color: #1e3a8a;
    }
    .btn-login:hover {
      background: #eab308;
    }
    .btn-register {
      background: #ef4444;
      color: white;
    }
    .btn-register:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

<div>
  <h1>Welcome to My Learning Platform</h1>
  <a href="login.html" class="btn btn-login">Login</a>
  <a href="register.html" class="btn btn-register">Sign Up</a>
</div>

</body>
</html>
