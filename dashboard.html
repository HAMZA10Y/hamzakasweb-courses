<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f3f4f6; }
    .navbar {
      background:#1e3a8a; color:white; padding:15px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .navbar h2 { margin:0; }
    .navbar button {
      background:#ef4444; color:white; border:none;
      padding:10px 15px; border-radius:6px; cursor:pointer;
    }
    .container { padding:30px; }
    .section-title { color:#1e3a8a; font-size:1.5em; margin-top:20px; }
    .card {
      background:white; padding:20px; margin:10px;
      border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);
      display:inline-block; width:220px; text-align:center;
    }
    .card a {
      display:block; margin-top:10px; padding:10px;
      background:#3b82f6; color:white; text-decoration:none; border-radius:6px;
    }
    .card a:hover { background:#2563eb; }
  </style>
</head>
<body>

<div class="navbar">
  <h2>My Courses</h2>
  <div>
    <span id="userEmail"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container" id="dashboard-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCQgHcWfkCid4Iv_ASrC5U7m20oJ7IdotE",
  authDomain: "hamzakasweb.firebaseapp.com",
  projectId: "hamzakasweb",
  storageBucket: "hamzakasweb.firebasestorage.app",
  messagingSenderId: "604127846186",
  appId: "1:604127846186:web:11629f1481d858679ac853",
  measurementId: "G-GT5Q49H071"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// عرض البريد الإلكتروني وحماية الصفحة
auth.onAuthStateChanged(user => {
  if(user) document.getElementById("userEmail").innerText = user.email;
  else window.location = "login.html";
});

// تسجيل الخروج
function logout() {
  auth.signOut().then(() => window.location="login.html");
}

// المواد
const subjects = ["Analyse","Algebre","Probabilites"];

subjects.forEach(subject => {
  fetch(`${subject}/files.json`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("dashboard-container");

      // عنوان المادة
      const sectionTitle = document.createElement("div");
      sectionTitle.className = "section-title";
      sectionTitle.textContent = subject;
      container.appendChild(sectionTitle);

      // إضافة الدروس
      data.forEach(lesson => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>${lesson.name}</h3>
          <a href="${subject}/${lesson.file}" target="_blank">Open PDF</a>`;
        container.appendChild(card);
      });
    });
});
</script>

</body>
</html>
