<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f3f4f6; }
    .navbar {
      background:#1e3a8a; color:white; padding:15px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .navbar h2 { margin:0; }
    .navbar button {
      background:#ef4444; color:white; border:none;
      padding:10px 15px; border-radius:6px; cursor:pointer;
    }
    .container { padding:30px; }
    .section-title { color:#1e3a8a; font-size:1.5em; margin-top:20px; }
    .card {
      background:white; padding:20px; margin:10px;
      border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);
      display:inline-block; width:220px; text-align:center;
    }
    .card a {
      display:block; margin-top:10px; padding:10px;
      background:#3b82f6; color:white; text-decoration:none; border-radius:6px;
    }
    .card a:hover { background:#2563eb; }
  </style>
</head>
<body>

<div class="navbar">
  <h2>My Courses</h2>
  <div>
    <span id="userEmail"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- Analyse -->
  <div class="section-title">Analyse</div>
  <div class="card">
    <h3>Cours 1</h3>
    <a href="https://github.com/<username>/<repo>/blob/main/Analyse/Cours1.pdf?raw=true" target="_blank">Open PDF</a>
  </div>
  <div class="card">
    <h3>Cours 2</h3>
    <a href="https://github.com/<username>/<repo>/blob/main/Analyse/Cours2.pdf?raw=true" target="_blank">Open PDF</a>
  </div>

  <!-- Algebre -->
  <div class="section-title">Algèbre</div>
  <div class="card">
    <h3>Cours 1</h3>
    <a href="https://github.com/<username>/<repo>/blob/main/Algebre/Cours1.pdf?raw=true" target="_blank">Open PDF</a>
  </div>

  <!-- Probabilités et statistiques -->
  <div class="section-title">Probabilités et statistiques</div>
  <div class="card">
    <h3>Cours 1</h3>
    <a href="https://github.com/<username>/<repo>/blob/main/Probabilites/Cours1.pdf?raw=true" target="_blank">Open PDF</a>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCQgHcWfkCid4Iv_ASrC5U7m20oJ7IdotE",
  authDomain: "hamzakasweb.firebaseapp.com",
  projectId: "hamzakasweb",
  storageBucket: "hamzakasweb.firebasestorage.app",
  messagingSenderId: "604127846186",
  appId: "1:604127846186:web:11629f1481d858679ac853",
  measurementId: "G-GT5Q49H071"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// حماية الصفحة وعرض البريد الإلكتروني
auth.onAuthStateChanged(user => {
  if(user) document.getElementById("userEmail").innerText = user.email;
  else window.location = "login.html";
});

// تسجيل الخروج
function logout() {
  auth.signOut().then(() => window.location="login.html");
}
</script>

</body>
</html>
